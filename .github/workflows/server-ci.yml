name: Server CI

on:
  push:
    paths:
      - 'server/**'
    branches: [main]
  pull_request:
    paths:
      - 'server/**'
    branches: [main]
  workflow_dispatch:

defaults:
  run:
    working-directory: ../sshvault-server

env:
  GO_VERSION: '1.25'

jobs:
  lint:
    name: Lint & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: Kiefer-Networks/sshvault-api
          token: ${{ secrets.SERVER_REPO_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Go vet
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Staticcheck
        run: staticcheck ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sshvault_test
          POSTGRES_USER: sshvault
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
        with:
          repository: Kiefer-Networks/sshvault-api
          token: ${{ secrets.SERVER_REPO_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests with race detection
        env:
          DATABASE_URL: postgres://sshvault:testpass@localhost:5432/sshvault_test?sslmode=disable
        run: go test -race -count=1 -timeout 300s ./...

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: Kiefer-Networks/sshvault-api
          token: ${{ secrets.SERVER_REPO_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6
        with:
          repository: Kiefer-Networks/sshvault-api
          token: ${{ secrets.SERVER_REPO_TOKEN }}

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t sshvault-server:ci .
