name: TMP Export Android Signing Secrets

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    name: Export secrets
    runs-on: ubuntu-latest
    steps:
      - name: Write secrets file
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          mkdir -p out
          {
            echo "KEY_ALIAS_BEGIN"
            printf '%s\n' "$KEY_ALIAS"
            echo "KEY_ALIAS_END"
            echo ""
            echo "STORE_PASSWORD_BEGIN"
            printf '%s\n' "$STORE_PASSWORD"
            echo "STORE_PASSWORD_END"
            echo ""
            echo "KEY_PASSWORD_BEGIN"
            printf '%s\n' "$KEY_PASSWORD"
            echo "KEY_PASSWORD_END"
            echo ""
            echo "KEYSTORE_BASE64_BEGIN"
            printf '%s\n' "$KEYSTORE_BASE64"
            echo "KEYSTORE_BASE64_END"
          } > out/secrets.txt
          echo "KEY_ALIAS length: ${#KEY_ALIAS}"
          echo "STORE_PASSWORD length: ${#STORE_PASSWORD}"
          echo "KEY_PASSWORD length: ${#KEY_PASSWORD}"
          echo "KEYSTORE_BASE64 length: ${#KEYSTORE_BASE64}"
          echo "secrets.txt size: $(wc -c < out/secrets.txt) bytes"

      - uses: actions/upload-artifact@v4
        with:
          name: signing-secrets
          path: out/secrets.txt
          retention-days: 1
          if-no-files-found: error
