name: CI

on:
  push:
    branches: ['**']
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint, Analyze & L10n
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Verify l10n completeness
        run: |
          # Extract keys from template (EN) — ignore @-metadata keys
          EN_KEYS=$(grep -oP '^\s*"(?!@@|@)(\w+)"' lib/l10n/app_en.arb | sort)
          ERRORS=0

          for ARB in lib/l10n/app_de.arb lib/l10n/app_es.arb; do
            LOCALE=$(basename "$ARB" .arb | sed 's/app_//')
            ARB_KEYS=$(grep -oP '^\s*"(?!@@|@)(\w+)"' "$ARB" | sort)

            MISSING=$(comm -23 <(echo "$EN_KEYS") <(echo "$ARB_KEYS"))
            if [ -n "$MISSING" ]; then
              echo "::error::Missing keys in $LOCALE: $MISSING"
              ERRORS=1
            fi

            EXTRA=$(comm -13 <(echo "$EN_KEYS") <(echo "$ARB_KEYS"))
            if [ -n "$EXTRA" ]; then
              echo "::warning::Extra keys in $LOCALE (not in EN): $EXTRA"
            fi
          done

          if [ "$ERRORS" -ne 0 ]; then
            echo "::error::Translation check failed — missing keys found."
            exit 1
          fi
          echo "All translations complete."

      - name: Verify generated l10n files are up to date
        run: |
          flutter gen-l10n
          if ! git diff --quiet lib/l10n/generated/; then
            echo "::error::Generated l10n files are out of date. Run 'flutter gen-l10n' and commit."
            git diff --stat lib/l10n/generated/
            exit 1
          fi

      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos

      - name: Check formatting
        run: dart format --set-exit-if-changed lib/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Run tests
        run: flutter test --reporter expanded
