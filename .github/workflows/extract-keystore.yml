name: Extract Keystore (one-time)

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          mkdir -p output

          # Save keystore file
          echo "$KEYSTORE_BASE64" | base64 -d > output/keystore.jks

          # Save credentials to a text file
          cat > output/key-credentials.txt <<EOF
          key_alias=$KEY_ALIAS
          key_password=$KEY_PASSWORD
          store_password=$STORE_PASSWORD
          EOF
          sed -i 's/^[[:space:]]*//' output/key-credentials.txt

          # Encrypt the output with a passphrase using openssl
          # The passphrase is the first 8 characters of the STORE_PASSWORD
          PASSPHRASE=$(echo -n "$STORE_PASSWORD" | head -c 8)
          tar czf - -C output . | openssl enc -aes-256-cbc -pbkdf2 -pass pass:"$PASSPHRASE" -out output/keystore-backup.enc

          # Remove plaintext files
          rm output/keystore.jks output/key-credentials.txt

          echo "Encrypted backup created. Decrypt with:"
          echo "openssl enc -d -aes-256-cbc -pbkdf2 -pass pass:<first-8-chars-of-store-password> -in keystore-backup.enc | tar xzf -"

      - uses: actions/upload-artifact@v4
        with:
          name: keystore-backup
          path: output/keystore-backup.enc
          retention-days: 1
