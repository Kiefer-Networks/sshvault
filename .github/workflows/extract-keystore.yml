name: Extract Keystore (one-time)

on:
  workflow_dispatch:
    inputs:
      passphrase:
        description: 'Encryption passphrase for the backup archive'
        required: true
        type: string

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Create encrypted backup
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          PASSPHRASE: ${{ inputs.passphrase }}
        run: |
          mkdir -p output plain

          echo "$KEYSTORE_BASE64" | base64 -d > plain/keystore.jks

          cat > plain/key-credentials.txt <<CREDS
          key_alias=$KEY_ALIAS
          key_password=$KEY_PASSWORD
          store_password=$STORE_PASSWORD
          CREDS
          sed -i 's/^[[:space:]]*//' plain/key-credentials.txt

          tar czf - -C plain . | openssl enc -aes-256-cbc -pbkdf2 -pass pass:"$PASSPHRASE" -out output/keystore-backup.enc

          rm -rf plain

          echo "Decrypt with: openssl enc -d -aes-256-cbc -pbkdf2 -pass pass:YOUR_PASSPHRASE -in keystore-backup.enc | tar xzf -"

      - uses: actions/upload-artifact@v4
        with:
          name: keystore-backup
          path: output/keystore-backup.enc
          retention-days: 1
