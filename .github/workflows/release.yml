name: Release — Build & Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  actions: read

env:
  FLUTTER_VERSION: stable

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Pre-flight: extract version, run lint + tests (gate)
  # ─────────────────────────────────────────────────────────────────────────
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - uses: actions/checkout@v4

      - id: version
        name: Extract version from pubspec.yaml
        run: |
          FULL=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          VERSION=$(echo "$FULL" | cut -d'+' -f1)
          BUILD=$(echo "$FULL" | cut -d'+' -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION+$BUILD"

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - run: flutter pub get
      - run: flutter gen-l10n
      - run: flutter analyze --no-fatal-infos
      - run: flutter test

  # ─────────────────────────────────────────────────────────────────────────
  # Android APK
  # ─────────────────────────────────────────────────────────────────────────
  build-android:
    name: Android (APK)
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - run: flutter pub get

      # Signing — expects base64-encoded keystore in secrets
      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks

      - name: Create key.properties
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=${STORE_PASSWORD}
          keyPassword=${KEY_PASSWORD}
          keyAlias=${KEY_ALIAS}
          storeFile=keystore.jks
          EOF
          # Remove leading whitespace from heredoc
          sed -i 's/^[[:space:]]*//' android/key.properties

      - name: Build APK
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # ─────────────────────────────────────────────────────────────────────────
  # Linux Flatpak
  # ─────────────────────────────────────────────────────────────────────────
  build-flatpak:
    name: Linux (Flatpak)
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libsecret-1-dev libjsoncpp-dev \
            flatpak flatpak-builder

      - name: Set up Flatpak
        run: |
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08

      - run: flutter pub get

      - name: Build Linux bundle
        run: flutter build linux --release

      - name: Prepare Flatpak dist
        run: |
          mkdir -p linux/flatpak-dist/bundle
          cp -r build/linux/x64/release/bundle/* linux/flatpak-dist/bundle/
          cp linux/de.kiefer_networks.sshvault.desktop linux/flatpak-dist/
          cp linux/de.kiefer_networks.sshvault.metainfo.xml linux/flatpak-dist/
          mkdir -p linux/flatpak-dist/icons
          cp linux/icons/*.png linux/flatpak-dist/icons/

      - name: Build Flatpak
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          cd linux
          flatpak-builder --force-clean --repo=repo build-dir de.kiefer_networks.sshvault.yml
          flatpak build-bundle repo "ShellVault-${VERSION}.flatpak" de.kiefer_networks.sshvault
          mv "ShellVault-${VERSION}.flatpak" ../

      - uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak
          path: '*.flatpak'

  # ─────────────────────────────────────────────────────────────────────────
  # macOS App
  # ─────────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (App)
    needs: preflight
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Create DMG
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          APP_PATH="build/macos/Build/Products/Release/sshvault.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH=$(find build/macos -name "*.app" -type d | head -1)
          fi
          mkdir -p dmg-staging
          cp -R "$APP_PATH" dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "ShellVault" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            "ShellVault-${VERSION}-macos.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: '*.dmg'

  # ─────────────────────────────────────────────────────────────────────────
  # Windows (MSIX)
  # ─────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (MSIX)
    needs: preflight
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Create MSIX
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        shell: pwsh
        run: |
          # Update msix_version in pubspec.yaml to match release version
          $v = "$env:VERSION.0"
          (Get-Content pubspec.yaml) -replace 'msix_version: .+', "msix_version: $v" | Set-Content pubspec.yaml
          dart run msix:create --build-windows false

      - name: Rename MSIX
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        shell: pwsh
        run: |
          $msix = Get-ChildItem -Path "build\windows\x64\runner\Release" -Filter "*.msix" | Select-Object -First 1
          if ($msix) {
            Copy-Item $msix.FullName "ShellVault-${env:VERSION}-windows.msix"
          }

      # Upload unsigned MSIX for SignPath signing
      - name: Upload unsigned MSIX
        id: upload-unsigned-msix
        uses: actions/upload-artifact@v4
        with:
          name: windows-msix-unsigned
          path: ShellVault-*.msix

      # SignPath signing (only if configured)
      - name: Sign MSIX with SignPath
        if: vars.SIGNPATH_ORGANIZATION_ID != ''
        id: sign-msix
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ vars.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: '${{ vars.SIGNPATH_PROJECT_SLUG }}'
          signing-policy-slug: '${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}'
          github-artifact-id: '${{ steps.upload-unsigned-msix.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: signed-msix
        continue-on-error: true

      # Upload final artifact (signed if available, unsigned otherwise)
      - name: Upload Windows MSIX
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            signed-msix/*.msix
            ShellVault-*.msix

  # ─────────────────────────────────────────────────────────────────────────
  # GitHub Release
  # ─────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [preflight, build-android, build-flatpak, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f | head -50

      - name: Collect release assets
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          mkdir -p release-assets

          # Android
          cp artifacts/android-apk/app-release.apk \
             "release-assets/ShellVault-${VERSION}-android.apk" 2>/dev/null || true

          # Linux (Flatpak)
          cp artifacts/linux-flatpak/*.flatpak release-assets/ 2>/dev/null || true

          # macOS
          cp artifacts/macos-dmg/*.dmg release-assets/ 2>/dev/null || true

          # Windows MSIX — prefer signed, fall back to unsigned
          if ls artifacts/windows-build/signed-msix/*.msix 1>/dev/null 2>&1; then
            cp artifacts/windows-build/signed-msix/*.msix \
               "release-assets/ShellVault-${VERSION}-windows.msix" 2>/dev/null || true
          elif ls artifacts/windows-build/*.msix 1>/dev/null 2>&1; then
            cp artifacts/windows-build/ShellVault-*.msix \
               "release-assets/ShellVault-${VERSION}-windows.msix" 2>/dev/null || true
          fi

          ls -lh release-assets/

      - name: Generate release notes
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          # Read changelog if available
          CHANGELOG=""
          if [ -f "metadata/en-US/changelogs/${BUILD_NUMBER:-4}.txt" ]; then
            CHANGELOG=$(cat "metadata/en-US/changelogs/${BUILD_NUMBER:-4}.txt")
          fi

          cat > release-notes.md <<NOTES
          ## ShellVault ${VERSION}

          ${CHANGELOG}

          ### Downloads

          | Platform | File |
          |----------|------|
          | Android (signed APK) | \`ShellVault-${VERSION}-android.apk\` |
          | Linux (Flatpak) | \`ShellVault-${VERSION}.flatpak\` |
          | macOS (DMG) | \`ShellVault-${VERSION}-macos.dmg\` |
          | Windows (MSIX) | \`ShellVault-${VERSION}-windows.msix\` |

          ### Install

          **Android:** Download and install the APK.

          **Linux:**
          \`\`\`bash
          flatpak install ShellVault-${VERSION}.flatpak
          flatpak run de.kiefer_networks.sshvault
          \`\`\`

          **macOS:** Open the DMG and drag ShellVault to Applications.

          **Windows:** Double-click the MSIX to install. Updates are handled automatically.

          ---
          **License:** AGPL-3.0 | **Website:** [kiefer-networks.de](https://kiefer-networks.de) | **Donate:** [Liberapay](https://de.liberapay.com/beli3ver)
          NOTES
          sed -i 's/^          //' release-notes.md

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ShellVault ${{ needs.preflight.outputs.version }}
          draft: false
          body_path: release-notes.md
          files: release-assets/*
