name: Release — Build & Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  actions: read

env:
  FLUTTER_VERSION: stable

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Pre-flight: extract version, run lint + tests (gate)
  # ─────────────────────────────────────────────────────────────────────────
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - uses: actions/checkout@v4

      - id: version
        name: Extract version from pubspec.yaml
        run: |
          FULL=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          VERSION=$(echo "$FULL" | cut -d'+' -f1)
          BUILD=$(echo "$FULL" | cut -d'+' -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION+$BUILD"

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - run: flutter pub get
      - run: flutter gen-l10n
      - run: flutter analyze --no-fatal-infos
      - run: flutter test

  # ─────────────────────────────────────────────────────────────────────────
  # Android APK + AAB
  # ─────────────────────────────────────────────────────────────────────────
  build-android:
    name: Android (APK + AAB)
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - run: flutter pub get

      # Signing — expects base64-encoded keystore in secrets
      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks

      - name: Create key.properties
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=${STORE_PASSWORD}
          keyPassword=${KEY_PASSWORD}
          keyAlias=${KEY_ALIAS}
          storeFile=keystore.jks
          EOF
          # Remove leading whitespace from heredoc
          sed -i 's/^[[:space:]]*//' android/key.properties

      - name: Build per-ABI APKs
        run: flutter build apk --release --split-per-abi

      - name: Build universal APK
        run: flutter build apk --release

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Rename AAB
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          cp build/app/outputs/bundle/release/app-release.aab \
             "SSHVault-${VERSION}.aab"

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-*.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: SSHVault-*.aab

  # ─────────────────────────────────────────────────────────────────────────
  # Linux Flatpak
  # ─────────────────────────────────────────────────────────────────────────
  build-flatpak:
    name: Linux (Flatpak)
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libsecret-1-dev libjsoncpp-dev \
            flatpak flatpak-builder

      - name: Set up Flatpak
        run: |
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08

      - run: flutter pub get

      - name: Build Linux bundle
        run: flutter build linux --release

      - name: Prepare Flatpak dist
        run: |
          mkdir -p linux/flatpak-dist/bundle
          cp -r build/linux/x64/release/bundle/* linux/flatpak-dist/bundle/
          cp linux/de.kiefer_networks.sshvault.desktop linux/flatpak-dist/
          cp linux/de.kiefer_networks.sshvault.metainfo.xml linux/flatpak-dist/
          mkdir -p linux/flatpak-dist/icons
          cp linux/icons/*.png linux/flatpak-dist/icons/

      - name: Build Flatpak
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          cd linux
          flatpak-builder --force-clean --repo=repo build-dir de.kiefer_networks.sshvault.yml
          flatpak build-bundle repo "SSHVault-${VERSION}.flatpak" de.kiefer_networks.sshvault
          mv "SSHVault-${VERSION}.flatpak" ../

      - uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak
          path: '*.flatpak'

  # ─────────────────────────────────────────────────────────────────────────
  # macOS App (signed + notarized when secrets are available)
  # ─────────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (App)
    needs: preflight
    runs-on: macos-latest
    env:
      HAS_SIGNING: ${{ secrets.MACOS_CERTIFICATE != '' }}
      HAS_NOTARIZATION: ${{ secrets.APPLE_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - run: flutter pub get

      - name: Import signing certificate
        if: env.HAS_SIGNING == 'true'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$MACOS_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Build macOS (unsigned, signed in post-build step)
        run: |
          cd macos
          sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Development"/CODE_SIGN_IDENTITY = "-"/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = 52MKZ6BJWB/DEVELOPMENT_TEAM = ""/g' Runner.xcodeproj/project.pbxproj
          cd ..
          flutter build macos --release

      - name: Sign app bundle
        if: env.HAS_SIGNING == 'true'
        run: |
          APP_PATH="build/macos/Build/Products/Release/sshvault.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH=$(find build/macos -name "*.app" -type d | head -1)
          fi

          codesign --deep --force --options runtime \
            --sign "Developer ID Application" \
            --keychain "$KEYCHAIN_PATH" \
            "$APP_PATH"

          codesign --verify --deep --strict "$APP_PATH"
          echo "Code signing verified"

      - name: Notarize app
        if: env.HAS_SIGNING == 'true' && env.HAS_NOTARIZATION == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH="build/macos/Build/Products/Release/sshvault.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH=$(find build/macos -name "*.app" -type d | head -1)
          fi

          ditto -c -k --keepParent "$APP_PATH" "$RUNNER_TEMP/sshvault.zip"

          xcrun notarytool submit "$RUNNER_TEMP/sshvault.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 15m

          xcrun stapler staple "$APP_PATH"
          echo "Notarization complete"

      - name: Create DMG
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          APP_PATH="build/macos/Build/Products/Release/sshvault.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH=$(find build/macos -name "*.app" -type d | head -1)
          fi
          mkdir -p dmg-staging
          cp -R "$APP_PATH" dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "SSHVault" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            "SSHVault-${VERSION}-macos.dmg"

      - name: Sign and notarize DMG
        if: env.HAS_SIGNING == 'true' && env.HAS_NOTARIZATION == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          codesign --force --sign "Developer ID Application" \
            --keychain "$KEYCHAIN_PATH" \
            "SSHVault-${VERSION}-macos.dmg"

          xcrun notarytool submit "SSHVault-${VERSION}-macos.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 15m

          xcrun stapler staple "SSHVault-${VERSION}-macos.dmg"

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: '*.dmg'

  # ─────────────────────────────────────────────────────────────────────────
  # Windows (EXE Installer)
  # ─────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (EXE)
    needs: preflight
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Create EXE installer
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        shell: pwsh
        run: |
          & 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe' /DAppVersion="$env:VERSION" windows\installer.iss

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: installer-output/*.exe

  # ─────────────────────────────────────────────────────────────────────────
  # GitHub Release
  # ─────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [preflight, build-android, build-flatpak, build-macos, build-windows]
    if: ${{ !cancelled() && needs.preflight.result == 'success' && needs.build-android.result == 'success' && needs.build-flatpak.result == 'success' && needs.build-windows.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f | head -50

      - name: Collect release assets
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          mkdir -p release-assets

          # Android per-ABI APKs + universal APK + AAB
          cp artifacts/android-apk/app-arm64-v8a-release.apk \
             "release-assets/SSHVault-${VERSION}-android-arm64-v8a.apk" 2>/dev/null || true
          cp artifacts/android-apk/app-armeabi-v7a-release.apk \
             "release-assets/SSHVault-${VERSION}-android-armeabi-v7a.apk" 2>/dev/null || true
          cp artifacts/android-apk/app-x86_64-release.apk \
             "release-assets/SSHVault-${VERSION}-android-x86_64.apk" 2>/dev/null || true
          cp artifacts/android-apk/app-release.apk \
             "release-assets/SSHVault-${VERSION}-android-universal.apk" 2>/dev/null || true
          cp artifacts/android-aab/SSHVault-*.aab \
             "release-assets/SSHVault-${VERSION}.aab" 2>/dev/null || true

          # Linux (Flatpak)
          cp artifacts/linux-flatpak/*.flatpak release-assets/ 2>/dev/null || true

          # macOS
          cp artifacts/macos-dmg/*.dmg release-assets/ 2>/dev/null || true

          # Windows EXE installer
          cp artifacts/windows-build/*.exe release-assets/ 2>/dev/null || true

          ls -lh release-assets/

      - name: Generate release notes
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
          BUILD_NUMBER: ${{ needs.preflight.outputs.build_number }}
        run: |
          # Read changelog if available
          CHANGELOG=""
          if [ -f "metadata/en-US/changelogs/${BUILD_NUMBER}.txt" ]; then
            CHANGELOG=$(cat "metadata/en-US/changelogs/${BUILD_NUMBER}.txt")
          fi

          cat > release-notes.md <<NOTES
          ## SSHVault ${VERSION}

          ${CHANGELOG}

          ### Downloads

          | Platform | File |
          |----------|------|
          | Android (arm64) | \`SSHVault-${VERSION}-android-arm64-v8a.apk\` |
          | Android (armv7) | \`SSHVault-${VERSION}-android-armeabi-v7a.apk\` |
          | Android (x86_64) | \`SSHVault-${VERSION}-android-x86_64.apk\` |
          | Android (universal) | \`SSHVault-${VERSION}-android-universal.apk\` |
          | Android (AAB for Play Store) | \`SSHVault-${VERSION}.aab\` |
          | Linux (Flatpak) | \`SSHVault-${VERSION}.flatpak\` |
          | macOS (DMG) | \`SSHVault-${VERSION}-macos.dmg\` |
          | Windows (EXE) | \`SSHVault-${VERSION}-windows-setup.exe\` |

          ### Install

          **Android:** Download and install the APK.

          **Linux:**
          \`\`\`bash
          flatpak install SSHVault-${VERSION}.flatpak
          flatpak run de.kiefer_networks.sshvault
          \`\`\`

          **macOS:** Open the DMG and drag SSHVault to Applications.

          **Windows:** Run the setup EXE and follow the installer.

          ---
          **License:** AGPL-3.0 | **Website:** [kiefer-networks.de](https://kiefer-networks.de) | **Donate:** [Liberapay](https://de.liberapay.com/beli3ver)
          NOTES
          sed -i 's/^          //' release-notes.md

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SSHVault ${{ needs.preflight.outputs.version }}
          draft: false
          body_path: release-notes.md
          files: release-assets/*
