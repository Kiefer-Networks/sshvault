name: sshvault
description: "Secure, self-hosted SSH client with zero-knowledge sync"
publish_to: 'none'
version: 1.16.0+46

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # State Management
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^17.1.0

  # Database
  drift: ^2.31.0
  drift_flutter: ^0.2.8

  # Immutable Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.11.0

  # Unique IDs
  uuid: ^4.5.1

  # Secure Storage — flutter_secure_storage 10.x already routes Linux
  # writes through libsecret via flutter_secure_storage_linux 3.x, so no
  # separate `libsecret_flutter` dependency is required. The Linux
  # backend talks to GNOME Keyring / KWallet over the freedesktop Secret
  # Service API. On headless boxes KeyringService transparently falls
  # back to an encrypted file (see lib/core/storage/keyring_service.dart).
  flutter_secure_storage: ^10.0.0

  # Crypto
  pointycastle: ^4.0.0
  cryptography: ^2.7.0
  crypto: ^3.0.6

  # File System
  path: ^1.9.0
  archive: ^4.0.2
  path_provider: ^2.1.5
  file_picker: ^10.3.10
  share_plus: ^12.0.1
  flutter_local_notifications: ^21.0.0
  url_launcher: ^6.3.1
  image_picker: ^1.1.2

  # Networking
  dio: ^5.7.0

  # Android-only background sync. The plugin spawns a headless Flutter
  # engine and dispatches into a top-level `callbackDispatcher`, so the
  # auto-sync keeps running with the app closed. iOS / desktop targets
  # don't ship a worker — `AndroidBackgroundSyncService` no-ops there.
  workmanager: ^0.5.2

  # Device Info
  device_info_plus: ^12.3.0

  # Biometric Authentication
  local_auth: ^3.0.1

  # In-App Purchase

  # UI
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.8.0
  flutter_slidable: ^4.0.3

  # SSH & Terminal
  dartssh2: ^2.9.0
  xterm: ^4.0.0
  package_info_plus: ^9.0.0

  # Proxy
  socks5_proxy: ^2.1.1

  # Linux/Windows system tray + window control
  tray_manager: ^0.5.2
  window_manager: ^0.4.3

  # Windows 11 Mica / Acrylic backdrop. Linux/macOS implementations exist
  # but we only activate on Windows (see WindowsChromeService — guarded by
  # Platform.isWindows). The DWM-direct calls (dark title bar, rounded
  # corners) live in lib/core/ffi/win32_dwm.dart.
  flutter_acrylic: ^1.1.4

  # Material You / Dynamic Color (Android 12+ wallpaper-derived accents).
  # On Android 12+ we ask the platform for the user's wallpaper-derived
  # CorePalette and feed it into the Material 3 ColorScheme as the seed
  # so the app picks up the system accent. The plugin no-ops on
  # non-Android / pre-Android-12 devices, so reading
  # `DynamicColorPlugin.getCorePalette()` there returns `null`.
  dynamic_color: ^1.7.0

  # Native Windows toast notifications (Windows.UI.Notifications) — backs
  # `WindowsNotificationService`. On Linux/macOS we keep falling through
  # to `flutter_local_notifications`, so this dependency is only used by
  # the Windows runner.
  local_notifier: ^0.1.6

  # VPN Detection (native, no external dependency)

  # Linux DBus integration (single-instance + krunner/rofi/polybar triggers)
  dbus: ^0.7.10

  # CLI argv parsing (sshvault --version / --help / --import-config / ...)
  args: ^2.5.0

  # Windows native interop — Pageant (PuTTY ssh-agent) compatibility plus
  # the OpenSSH-for-Windows named-pipe agent live behind Win32 APIs that
  # we reach through dart:ffi. `ffi` brings the Utf16/Utf8 conversion
  # helpers; `win32` provides typed bindings for FindWindowW,
  # CreateFileMappingW, MapViewOfFile, SendMessageW, CreateFileW etc.
  ffi: ^2.1.0
  win32: ^5.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

  # Code Generation
  build_runner: ^2.12.2
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  riverpod_generator: ^4.0.3
  drift_dev: ^2.31.0

dependency_overrides:
  # Local fork with SFTP subsystem await fix (sendSubsystem was not awaited in sftp())
  dartssh2:
    path: packages/dartssh2

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
