name: sshvault
description: "Secure, self-hosted SSH client with zero-knowledge sync"
publish_to: 'none'
version: 1.3.5+15

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # State Management
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^17.1.0

  # Database
  drift: ^2.31.0
  drift_flutter: ^0.2.8

  # Immutable Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.11.0

  # Unique IDs
  uuid: ^4.5.1

  # Secure Storage
  flutter_secure_storage: ^10.0.0

  # Crypto
  pointycastle: ^4.0.0
  cryptography: ^2.7.0
  crypto: ^3.0.6

  # File System
  path: ^1.9.0
  archive: ^4.0.2
  path_provider: ^2.1.5
  file_picker: ^10.3.10
  share_plus: ^12.0.1
  flutter_local_notifications: ^21.0.0
  url_launcher: ^6.3.1
  image_picker: ^1.1.2

  # Networking
  dio: ^5.7.0

  # Device Info
  device_info_plus: ^12.3.0

  # Biometric Authentication
  local_auth: ^3.0.1

  # In-App Purchase

  # UI
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.8.0
  flutter_slidable: ^4.0.3

  # SSH & Terminal
  dartssh2: ^2.9.0
  xterm: ^4.0.0
  package_info_plus: ^9.0.0

  # Proxy
  socks5_proxy: ^2.1.1

  # VPN Detection (native, no external dependency)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

  # Code Generation
  build_runner: ^2.12.2
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  riverpod_generator: ^4.0.3
  drift_dev: ^2.31.0
  msix: ^3.16.13

msix_config:
  display_name: SSHVault
  publisher_display_name: Kiefer Networks
  publisher: CN=Kiefer Networks, O=Kiefer Networks, C=DE
  identity_name: de.kiefer-networks.sshvault
  msix_version: 1.3.4.0
  logo_path: windows/runner/resources/app_icon.ico
  capabilities: internetClient
  languages: en, de, es, fr, pt, it, ru, uk, pl, ja, ko, zh, ar, hi, tr, sv, nb, da, fi, cs, hu, ro, th, vi, nl, id, el, he
  architecture: x64
  sign_msix: false
  install_certificate: false

dependency_overrides:
  # Local fork with SFTP subsystem await fix (sendSubsystem was not awaited in sftp())
  dartssh2:
    path: packages/dartssh2

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
