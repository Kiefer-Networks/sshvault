name: shellvault
description: "Secure, self-hosted SSH client with zero-knowledge sync"
publish_to: 'none'
version: 0.0.1+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Database
  drift: ^2.28.2
  drift_flutter: ^0.2.7

  # Immutable Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Unique IDs
  uuid: ^4.5.1

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # Crypto
  pointycastle: ^3.9.1
  cryptography: ^2.7.0
  crypto: ^3.0.6

  # File System
  archive: ^4.0.2
  path_provider: ^2.1.5
  file_picker: ^8.3.7
  share_plus: ^10.1.4
  url_launcher: ^6.3.1

  # Networking
  dio: ^5.7.0

  # OAuth
  sign_in_with_apple: ^6.1.4
  google_sign_in: ^6.3.0

  # Device Info
  device_info_plus: ^11.5.0

  # Connectivity
  connectivity_plus: ^6.1.5

  # Biometric Authentication
  local_auth: ^2.3.0

  # In-App Purchase
  in_app_purchase: ^3.2.0

  # UI
  flutter_slidable: ^3.1.2

  # SSH & Terminal
  dartssh2: ^2.9.0
  xterm: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

  # Code Generation
  build_runner: ^2.5.4
  freezed: ^3.1.0
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.5
  drift_dev: ^2.28.0

flutter:
  generate: true
  uses-material-design: true
