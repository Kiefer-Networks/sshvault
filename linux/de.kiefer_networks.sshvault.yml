# ---------------------------------------------------------------------------
# Flatpak manifest for SSHVault.
#
# NOTE ON APPARMOR:
#   Flatpak users do NOT need the AppArmor profile shipped under
#   linux/apparmor/de.kiefer_networks.sshvault. The Flatpak sandbox
#   (bubblewrap + portal-mediated filesystem access + the finish-args below)
#   is strictly tighter than the AppArmor policy: filesystem reads outside
#   ~/.ssh / xdg-download go through the FileChooser portal, the network is
#   the only IPC channel that isn't already brokered, and there is no shell
#   exec path. Running both at once is redundant and only causes confusion
#   when debugging permission denials.
#
#   The AppArmor profile is intended ONLY for users who install SSHVault
#   from a native .deb / .rpm on Debian, Ubuntu or OpenSUSE. Distro
#   packagers should drop it into /etc/apparmor.d/ from their post-install
#   hook (see linux/apparmor/postinst.sh).
# ---------------------------------------------------------------------------
app-id: de.kiefer_networks.sshvault
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: sshvault

finish-args:
  # Display — required for the Flutter window to render under either
  # X11 (via the fallback socket) or Wayland.
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  # GPU acceleration — Skia wants direct rendering for hardware
  # compositing.
  - --device=dri
  # Network access — required for SSH connections and the encrypted
  # vault sync to the self-hosted backend. There is no portal
  # equivalent for raw outbound TCP / TLS, so this stays direct.
  - --share=network
  # Secret Service API (org.freedesktop.secrets). flutter_secure_storage
  # persists the vault master key in libsecret (GNOME Keyring /
  # KWallet) through this name. When the host doesn't expose it (some
  # immutable distros, kiosk setups) KeyringService falls back to
  # org.freedesktop.portal.Secret via the portal name below — so this
  # line is *optional*. Distributors may remove it for an extra-strict
  # sandbox; the app remains functional via the portal fallback. Until
  # the portal-only path is the default we keep this for
  # backwards-compatible behavior on existing installs.
  - --talk-name=org.freedesktop.secrets
  # XDG desktop portal — single sandbox-friendly entry point for:
  #   * org.freedesktop.portal.Settings    — live system theme +
  #     accent color (DesktopAppearanceService).
  #   * org.freedesktop.portal.FileChooser — invoked by the
  #     `file_picker` plugin (10.x) so the user picks files via the
  #     host's file dialog rather than a sandbox-bound
  #     GtkFileChooserNative. Routes file imports/exports across the
  #     SFTP, SSH key, settings export and host-config import flows.
  #   * org.freedesktop.portal.OpenURI     — invoked by `url_launcher`
  #     (6.3.x) to open the About / donation / docs links without an
  #     `xdg-open` exec.
  #   * org.freedesktop.portal.Secret      — KeyringService fallback
  #     when org.freedesktop.secrets is unreachable.
  # Adding any of these directly (e.g. --talk-name=
  # org.freedesktop.portal.OpenURI) is unnecessary; the Desktop bus
  # name covers the whole portal surface.
  - --talk-name=org.freedesktop.portal.Desktop
  # File picker / export defaults. The picker itself routes through
  # the FileChooser portal (above), so these only matter for the
  # in-app code that pre-resolves a default save location and
  # surfaces files the user has *already* chosen.
  - --filesystem=home:ro
  - --filesystem=xdg-download
  # SSH config and key import (read-only). xdg-config/ssh covers the
  # XDG-compliant location (~/.config/ssh/config) used by some
  # distributions; ~/.ssh covers the historical OpenSSH default.
  # Both stay :ro — SSHVault never writes to the user's host SSH
  # store.
  - --filesystem=xdg-config/ssh:ro
  - --filesystem=~/.ssh:ro
  # Notifications — flutter_local_notifications uses the freedesktop
  # Notifications spec rather than the portal so we keep the direct
  # bus name.
  - --talk-name=org.freedesktop.Notifications
  # SSH agent forwarding — gives the sandboxed app access to the
  # host's running ssh-agent socket so the "Use key from ssh-agent"
  # flow works.
  - --socket=ssh-auth
  # systemd-logind — used by PowerInhibitorService to call
  # org.freedesktop.login1.Manager.Inhibit("sleep:idle", ...) so the system
  # does not auto-suspend while at least one SSH session is active.
  - --system-talk-name=org.freedesktop.login1

modules:
  # intltool — libdbusmenu's autotools configure refuses to run without
  # >= 0.35.0; the Freedesktop SDK ships an older version, so we bundle
  # the canonical 0.51.0 release as a build-only dependency.
  - name: intltool
    buildsystem: autotools
    cleanup:
      - "*"
    sources:
      - type: archive
        url: https://launchpad.net/intltool/trunk/0.51.0/+download/intltool-0.51.0.tar.gz
        sha256: 67c74d94196b153b774ab9f89b2fa6c6ba79352407037c8c14d5aeb334e959cd

  # libayatana-appindicator — required by tray_manager / system tray icon on
  # KDE Plasma, GNOME (with AppIndicator extension), XFCE and Cinnamon.
  # The Freedesktop 24.08 runtime does NOT ship this library, so it has to
  # be bundled via the Flatpak. Pulled together with its small dependency
  # chain (libdbusmenu-glib, libdbusmenu-gtk3, libayatana-indicator).
  - name: libdbusmenu
    buildsystem: autotools
    build-options:
      env:
        # Upstream's Makefile bakes in -Werror=deprecated-declarations on
        # GLib >= 2.58 because it still uses G_PRIVATE_OFFSET / G_DEFINE_*
        # patterns from GLib 2.36, and modern GLib emits a deprecation
        # warning that escalates to a build error. Strip -Werror so the
        # warnings don't kill the build.
        CFLAGS: "-Wno-deprecated-declarations -Wno-error"
        CXXFLAGS: "-Wno-deprecated-declarations -Wno-error"
    config-opts:
      - --disable-dumper
      - --disable-static
      - --disable-tests
      - --disable-gtk-doc
      - --disable-vala
      - --disable-introspection
      - --with-gtk=3
    cleanup:
      - /include
      - /libexec
      - /lib/pkgconfig
      - /share/gir-1.0
      - /share/libdbusmenu
      - /share/man
    sources:
      - type: archive
        url: https://launchpad.net/libdbusmenu/16.04/16.04.0/+download/libdbusmenu-16.04.0.tar.gz
        sha256: b9cc4a2acd74509435892823607d966d424bd9ad5d0b00938f27240a1bfa878a
      # Upstream's configure.ac wraps AM_CONDITIONAL([HAVE_VALGRIND]) inside
      # AS_IF([test "x$enable_tests" != "xno"], [...]) — when we pass
      # --disable-tests the conditional is never defined, but later parts
      # of the build reference it and configure aborts. Move the
      # AM_CONDITIONAL out of the AS_IF block, then regenerate configure
      # via autoreconf so the change takes effect (the shipped 16.04
      # tarball pre-bakes a configure script).
      - type: shell
        commands:
          - "sed -i '/AM_CONDITIONAL(\\[HAVE_VALGRIND\\]/d' configure.ac"
          - "sed -i '/AC_SUBST(DBUSMENUTESTS_CFLAGS)/i AM_CONDITIONAL([HAVE_VALGRIND], [test \"x$have_valgrind\" = \"xyes\"])' configure.ac"
          # Strip -Werror from per-subdir Makefile.am so modern GLib's
          # deprecation warnings (G_PRIVATE_OFFSET → G_ADD_PRIVATE) do
          # not escalate to build errors.
          - "find . -name Makefile.am -exec sed -i 's/-Werror//g' {} +"
          - "rm -f configure aclocal.m4"
          - "autoreconf -fi"

  - name: ayatana-ido
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_INSTALL_LIBDIR=lib
      - -DENABLE_TESTS=OFF
    cleanup:
      - /include
      - /lib/pkgconfig
    sources:
      - type: archive
        url: https://github.com/AyatanaIndicators/ayatana-ido/archive/refs/tags/0.10.4.tar.gz
        sha256: bd59abd5f1314e411d0d55ce3643e91cef633271f58126be529de5fb71c5ab38
      # Drop Vala vapi generation — Freedesktop SDK 24.08 ships no Vala
      # compiler. The .vapi binding is not needed at runtime; only the
      # .so + .typelib are. Make find_package(Vala) optional, and add a
      # standalone add_custom_target("ido_typelib" ALL ...) so the
      # introspection commands still fire (the original ALL trigger
      # depended on .vapi which is now gated).
      - type: shell
        commands:
          - "sed -i 's|find_package(Vala REQUIRED QUIET)|find_package(Vala QUIET)|' src/CMakeLists.txt"
          - "sed -i '/find_package(Vala QUIET)/i \\    add_custom_target(\"ido_typelib\" ALL DEPENDS \"${CMAKE_CURRENT_BINARY_DIR}/AyatanaIdo3-0.4.typelib\")' src/CMakeLists.txt"

  - name: libayatana-indicator
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_INSTALL_LIBDIR=lib
      - -DENABLE_TESTS=OFF
    cleanup:
      - /include
      - /lib/pkgconfig
      - /share/gir-1.0
    sources:
      - type: archive
        url: https://github.com/AyatanaIndicators/libayatana-indicator/archive/refs/tags/0.9.4.tar.gz
        sha256: a18d3c682e29afd77db24366f8475b26bda22b0e16ff569a2ec71cd6eb4eac95

  - name: libayatana-appindicator
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_INSTALL_LIBDIR=lib
      - -DENABLE_BINDINGS_MONO=OFF
      - -DENABLE_BINDINGS_VALA=OFF
      - -DENABLE_TESTS=OFF
    cleanup:
      - /include
      - /lib/pkgconfig
      - /share/gir-1.0
    sources:
      - type: archive
        url: https://github.com/AyatanaIndicators/libayatana-appindicator/archive/refs/tags/0.5.92.tar.gz
        sha256: adedcf160dae7547971d475b42062cab278d54ec075537e6958ffdbf2d996857

  - name: libsecret
    buildsystem: meson
    config-opts:
      - -Dmanpage=false
      - -Dvapi=false
      - -Dgtk_doc=false
      - -Dintrospection=false
      - --libdir=lib
    cleanup:
      - /bin
      - /include
      - /lib/pkgconfig
      - /share/man
    sources:
      - type: archive
        url: https://download.gnome.org/sources/libsecret/0.21/libsecret-0.21.4.tar.xz
        sha256: 163d08d783be6d4ab9a979ceb5a4fecbc1d9660d3c34168c581301cd53912b20

  - name: liboqs
    # Open Quantum Safe — provides ML-KEM-768 (FIPS 203) and sntrup761
    # for the hybrid post-quantum SSH key exchanges advertised in
    # OpenSSH 9.9+. Built from source so the resulting .so is bundled
    # inside the Flatpak runtime alongside SSHVault. OQS_MINIMAL_BUILD
    # restricts the compile to just the two KEMs we need so the build
    # finishes in seconds instead of pulling in BIKE / Classic McEliece /
    # all of Dilithium / Falcon / FrodoKEM (we use none of them).
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DOQS_BUILD_ONLY_LIB=ON
      - -DOQS_DIST_BUILD=ON
      - -DBUILD_SHARED_LIBS=ON
      - -DOQS_USE_OPENSSL=OFF
      - -DOQS_MINIMAL_BUILD=KEM_ml_kem_768;KEM_sntrup_sntrup761
      - -DCMAKE_INSTALL_LIBDIR=lib
    cleanup:
      - /include
      - /lib/pkgconfig
      - /lib/cmake
    sources:
      - type: archive
        url: https://github.com/open-quantum-safe/liboqs/archive/refs/tags/0.10.1.tar.gz
        sha256: 00ca8aba65cd8c8eac00ddf978f4cac9dd23bb039f357448b60b7e3eed8f02da

  - name: sshvault
    buildsystem: simple
    build-commands:
      - cp -r bundle/* /app/
      - chmod +x /app/sshvault
      - mkdir -p /app/bin
      - ln -s /app/sshvault /app/bin/sshvault
      - install -Dm644 de.kiefer_networks.sshvault.desktop /app/share/applications/de.kiefer_networks.sshvault.desktop
      - install -Dm644 de.kiefer_networks.sshvault.service /app/share/dbus-1/services/de.kiefer_networks.sshvault.service
      - install -Dm644 de.kiefer_networks.sshvault.metainfo.xml /app/share/metainfo/de.kiefer_networks.sshvault.metainfo.xml
      - install -Dm644 icons/128x128.png /app/share/icons/hicolor/128x128/apps/de.kiefer_networks.sshvault.png
      - install -Dm644 icons/256x256.png /app/share/icons/hicolor/256x256/apps/de.kiefer_networks.sshvault.png
      # Bundle the KRunner integration sources inside the Flatpak so users
      # can opt-in by running the install script from the host shell. We
      # cannot register the runner with KRunner from inside the sandbox:
      # KRunner reads plugins from ~/.local/share/krunner/dbusplugins/ on
      # the host, and Flatpak's session-bus filtering plus the lack of
      # host filesystem write access mean a sandboxed app cannot drop the
      # required files into place. Users who want KRunner integration on
      # a Flatpak install must run /app/share/sshvault/krunner/install.sh
      # via `flatpak run --command=... ` or copy the files manually.
      - install -Dm755 krunner/de.kiefer_networks.sshvault-runner.py /app/share/sshvault/krunner/de.kiefer_networks.sshvault-runner.py
      - install -Dm644 krunner/de.kiefer_networks.sshvault-runner.desktop /app/share/sshvault/krunner/de.kiefer_networks.sshvault-runner.desktop
      - install -Dm644 krunner/de.kiefer_networks.SshvaultKRunner.service /app/share/sshvault/krunner/de.kiefer_networks.SshvaultKRunner.service
      - install -Dm755 krunner/install.sh /app/share/sshvault/krunner/install.sh
      - install -Dm644 krunner/README.md /app/share/sshvault/krunner/README.md
    sources:
      - type: dir
        path: flatpak-dist
      - type: dir
        path: krunner
        dest: krunner
