app-id: de.kiefer_networks.sshvault
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: sshvault

finish-args:
  # Display
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  # GPU acceleration
  - --device=dri
  # Network access (SSH connections, sync)
  - --share=network
  # Secret Service API (flutter_secure_storage)
  - --talk-name=org.freedesktop.secrets
  # File picker / export
  - --filesystem=home:ro
  - --filesystem=xdg-download
  # SSH config and key import
  - --filesystem=~/.ssh:ro
  # Notifications
  - --talk-name=org.freedesktop.Notifications
  # SSH agent forwarding
  - --socket=ssh-auth

modules:
  - name: libsecret
    buildsystem: meson
    config-opts:
      - -Dmanpage=false
      - -Dvapi=false
      - -Dgtk_doc=false
      - -Dintrospection=false
      - --libdir=lib
    cleanup:
      - /bin
      - /include
      - /lib/pkgconfig
      - /share/man
    sources:
      - type: archive
        url: https://download.gnome.org/sources/libsecret/0.21/libsecret-0.21.4.tar.xz
        sha256: 163d08d783be6d4ab9a979ceb5a4fecbc1d9660d3c34168c581301cd53912b20

  - name: liboqs
    # Open Quantum Safe — provides ML-KEM-768 (FIPS 203) and sntrup761
    # for the hybrid post-quantum SSH key exchanges advertised in
    # OpenSSH 9.9+. Built from source so the resulting .so is bundled
    # inside the Flatpak runtime alongside SSHVault.
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DOQS_BUILD_ONLY_LIB=ON
      - -DOQS_DIST_BUILD=ON
      - -DBUILD_SHARED_LIBS=ON
      - -DOQS_USE_OPENSSL=OFF
      - --libdir=lib
    cleanup:
      - /include
      - /lib/pkgconfig
      - /lib/cmake
    sources:
      - type: archive
        url: https://github.com/open-quantum-safe/liboqs/archive/refs/tags/0.10.1.tar.gz
        sha256: c33cc3fb3a3f06be08e1e54076d7b0a32fc8c4720ed4e07845d8e6e21ac9a785

  - name: sshvault
    buildsystem: simple
    build-commands:
      - cp -r bundle/* /app/
      - chmod +x /app/sshvault
      - mkdir -p /app/bin
      - ln -s /app/sshvault /app/bin/sshvault
      - install -Dm644 de.kiefer_networks.sshvault.desktop /app/share/applications/de.kiefer_networks.sshvault.desktop
      - install -Dm644 de.kiefer_networks.sshvault.metainfo.xml /app/share/metainfo/de.kiefer_networks.sshvault.metainfo.xml
      - install -Dm644 icons/128x128.png /app/share/icons/hicolor/128x128/apps/de.kiefer_networks.sshvault.png
      - install -Dm644 icons/256x256.png /app/share/icons/hicolor/256x256/apps/de.kiefer_networks.sshvault.png
    sources:
      - type: dir
        path: flatpak-dist
